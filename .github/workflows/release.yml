name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Create plugin ZIP
        run: |
          PLUGIN_SLUG="portico_webworks_plugin"
          mkdir -p "build/$PLUGIN_SLUG"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cursor' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            --exclude='vendor/composer' \
            --exclude='vendor/autoload.php' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='build' \
            ./ "build/$PLUGIN_SLUG/"
          cd build && zip -r "../$PLUGIN_SLUG.zip" "$PLUGIN_SLUG"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: portico_webworks_plugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch or tag)'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.event.release.tag_name }}

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Create plugin ZIP
        run: |
          PLUGIN_SLUG="portico_webworks_plugin"
          mkdir -p "build/$PLUGIN_SLUG"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cursor' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='build' \
            ./ "build/$PLUGIN_SLUG/"
          cd build && zip -r "../$PLUGIN_SLUG.zip" "$PLUGIN_SLUG"

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: portico_webworks_plugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: portico_webworks_plugin
          path: portico_webworks_plugin.zip
